spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/gestion_pre_electoral}
    username: ${DB_USER:${DB_USUARIO:gestion_pre_electoral}}
    password: ${DB_PASSWORD:${DB_CLAVE:gestion_pre_electoral}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: gestion_pre_electoral

grpc:
  elecciones:
    host: ${ELECCIONES_GRPC_HOST:localhost}
    port: ${ELECCIONES_GRPC_PORT:9090}

fotos:
  directorio: ${FOTOS_DIRECTORIO:target/test-fotos}