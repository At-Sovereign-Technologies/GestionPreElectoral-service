spring:
  application:
    name: gestion-pre-electoral

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/gestion_pre_electoral}
    username: ${DB_USUARIO:gestion_pre_electoral}
    password: ${DB_CLAVE:gestion_pre_electoral}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: gestion_pre_electoral
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${PUERTO:8082}

logging:
  level:
    root: INFO
    com.selloLegitimo.GestionPreElectoral: DEBUG

grpc:
  elecciones:
    host: ${ELECCIONES_GRPC_HOST:localhost}
    port: ${ELECCIONES_GRPC_PORT:9090}

fotos:
  directorio: ${FOTOS_DIRECTORIO:/data/fotos-candidatos}