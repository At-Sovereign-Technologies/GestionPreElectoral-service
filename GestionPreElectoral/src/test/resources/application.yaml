spring:
  datasource:
    url: jdbc:h2:mem:gestion_pre_electoral;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS gestion_pre_electoral\;SET SCHEMA gestion_pre_electoral
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: gestion_pre_electoral