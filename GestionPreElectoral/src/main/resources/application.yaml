spring:
  application:
    name: GestionPreElectoral
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/gestion_pre_electoral}
    username: ${DB_USUARIO:gestion_pre_electoral}
    password: ${DB_CLAVE:gestion_pre_electoral}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: gestion_pre_electoral
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: ${PUERTO:8082}
logging:
  level:
    root: INFO
    com.selloLegitimo.GestionPreElectoral: INFO
grpc:
  elecciones:
    host: ${ELECCIONES_GRPC_HOST:localhost}
    port: ${ELECCIONES_GRPC_PORT:9090}
