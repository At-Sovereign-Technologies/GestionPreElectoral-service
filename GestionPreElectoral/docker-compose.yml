services:
  postgres:
    image: postgres:16
    container_name: gestion-pre-electoral-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_pre_electoral
      POSTGRES_USER: gestion_pre_electoral
      POSTGRES_PASSWORD: gestion_pre_electoral
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestion_pre_electoral -d gestion_pre_electoral"]
      interval: 10s
      timeout: 5s
      retries: 5

